<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Material</title>


<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
}


.container{
    width:420px;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 8px rgba(0,0,0,0.2);
}


h2{
    text-align:center;
}


input, textarea, button{
    width:100%;
    padding:8px;
    margin:6px 0;
}
</style>
</head>


<body>


<div class="container">
<h2>Registro de Material</h2>


<form action="" method="post">


<label>Nombre del material:</label>
<input type="text" name="nombreMaterial" required>


<label>Stock:</label>
<input type="number" name="stock" min="0" required>


<label>Stock mínimo:</label>
<input type="number" name="stockMinimo" min="0" required>


<label>Precio unitario:</label>
<input type="number" name="precioUnitario" min="0" step="0.01" required>


<label>Descripción:</label>
<textarea name="descripcion" rows="3"></textarea>


<button type="submit">Guardar Material</button>


</form>
</div>


</body>
</html>
