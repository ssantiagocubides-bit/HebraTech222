<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USUARIOS</title>
</head>
<body>
<form action="" method="get">
        <p>
            IDUsuario: <input type="number" name="ID Usuario" required />
        </p>      
        <p>
            Nombre: <input type="text" name="nombre_control" required />
        </p>
        <p>
            Apellido: <input type="text" name="apellido_control" required />
        </p>
        <p>
            Email: <input type="email" name="email_control" autofocus required />
        </p>
        <p>
            Contraseña:<input type="password" id="password" name="password_control" required />
        </p>
        <p>
           Rol:
    <select name="rol_usuario" required>
        <option value="">Selecciona una opción</option>
        <option value="admin">Administrador</option>
        <option value="Operario">Operario</option>
        <option value="usuario">Usuario</option>
    </select>
    <p>
        <button type="submit">Ingresar</button>
    </p>
</p>
</form>
</body>
</html>
